services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:8000"
    env_file:
      - ./backend/.env
    environment:
      - PROJECT_HELPER_DATA_DIR=/app/data
    volumes:
      - project-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  project-data:
